name: Data_Engineering_Platform

# ══════════════════════════════════════════════════════════════
# PFE Data Platform — Docker Compose (Phase A On-Premises)
# Architecture ELT : Sources → Beam → Postgres Bronze → DuckDB/dbt → Gold
# Tous les chemins sont relatifs au dossier docker/
# ══════════════════════════════════════════════════════════════

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  # Chargement des variables d'environnement depuis .env pour éviter les valeurs hardcodées
  env_file:
    - ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_infra:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: "INFO"
    AIRFLOW__METRICS__EXPOSE_CONFIG: "True"
    POSTGRES_DWH_HOST: postgres_dwh
    POSTGRES_DWH_PORT: 5432
    POSTGRES_SOURCE_HOST: postgres_source
    POSTGRES_SOURCE_PORT: 5432
    PYTHONPATH: /opt/airflow
    FASTAPI_MOCK_URL: http://fastapi_mock:80
#  user: "50000:0"
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
    - ../src:/opt/airflow/src
    - ../data:/opt/airflow/data
    - ../dbt:/opt/airflow/dbt
  depends_on:
    postgres_infra:
      condition: service_healthy

services:

  # ══════════════════════════════════════════════════
  # LAYER 1 — SOURCES
  # ══════════════════════════════════════════════════

  postgres_source:
    image: postgres:15
    container_name: postgres_source
    # Chargement des variables d'environnement pour sécuriser les credentials
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_SOURCE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SOURCE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_SOURCE_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_source_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_SOURCE_USER} -d ${POSTGRES_SOURCE_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  fastapi-mock:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fastapi
    container_name: fastapi_mock
    ports:
      - "8090:80"
    volumes:
      - ../api:/app
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # LAYER 2 — STORAGE (Data Lake Bronze / Postgres DWH)
  # ══════════════════════════════════════════════════

  postgres_dwh:
    image: postgres:15
    container_name: postgres_dwh
    # Chargement des variables d'environnement pour le Data Warehouse
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_DWH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DWH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DWH_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_DWH_USER} -d ${POSTGRES_DWH_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # LAYER 3 — ORCHESTRATION (Airflow)
  # ══════════════════════════════════════════════════

  postgres_infra:
    image: postgres:15
    container_name: postgres_infra
    # Chargement des variables d'environnement pour la base Airflow
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_INFRA_USER}
      POSTGRES_PASSWORD: ${POSTGRES_INFRA_PASSWORD}
      POSTGRES_DB: ${POSTGRES_INFRA_DB}
    volumes:
      - postgres_infra_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_INFRA_USER} -d ${POSTGRES_INFRA_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - "airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    depends_on:
      postgres_infra:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # CROSS-CUTTING — dbt docs (Catalogue & Lineage)
  # ══════════════════════════════════════════════════

  dbt-docs:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: dbt_docs
    ports:
      - "8085:8080"
    # Chargement des variables d'environnement pour dbt
    env_file:
      - ../.env
    environment:
      POSTGRES_DWH_HOST: postgres_dwh
      POSTGRES_DWH_PORT: 5432
    volumes:
      - ../dbt:/dbt
      - ../data:/data
    depends_on:
      postgres_dwh:
        condition: service_healthy
    restart: "no"

  # ══════════════════════════════════════════════════
  # CROSS-CUTTING — Monitoring (Prometheus + Grafana)
  # ══════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    # Chargement des credentials Grafana depuis .env
    env_file:
      - ../.env
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_DWH_HOST: postgres_dwh
      POSTGRES_DWH_PORT: 5432
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

  # ══════════════════════════════════════════════════
  # ADMIN — pgAdmin
  # ══════════════════════════════════════════════════

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    # Variables d'environnement pour pgAdmin
    env_file:
      - ../.env
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    restart: unless-stopped

# ══════════════════════════════════════════════════
# VOLUMES
# ══════════════════════════════════════════════════

volumes:
  postgres_source_data:
  postgres_dwh_data:
  postgres_infra_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:
