apiVersion: 1

datasources:
  # ─── Source PostgreSQL (DWH) ───────────────────────
  - name: PostgreSQL (DWH)
    type: grafana-postgresql-datasource
    uid: 'postgres_dwh_uid'
    url: postgres_dwh:5432
    database: dwh_db
    user: admin
    secureJsonData:
      password: admin
    jsonData:
      sslmode: 'disable'
      postgresVersion: 15
      timescaledb: false
    isDefault: true

  # ─── Source Prometheus (Metrics) ───────────────────
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: false
