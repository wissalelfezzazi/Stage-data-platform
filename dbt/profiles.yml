ecommerce_platform:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ../data/processed/warehouse.duckdb
      extensions:
        - postgres
      # Configuration pour lire directement de PostgreSQL (Bronze)
      attach:
        - path: "host={{ env_var('POSTGRES_DWH_HOST') }} port={{ env_var('POSTGRES_DWH_PORT') }} user={{ env_var('POSTGRES_DWH_USER') }} password={{ env_var('POSTGRES_DWH_PASSWORD') }} dbname={{ env_var('POSTGRES_DWH_DB') }}"
          type: postgres
          alias: postgres_db
      threads: 4
      settings:
        checkpoint_threshold: 2G
